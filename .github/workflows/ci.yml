name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --extra dev --locked

      - name: Verify lockfile and dependencies
        run: |
          uv lock --check
          uv audit --frozen

      - name: Verify console script
        run: uv run dreamloop --help

      - name: Run tests
        run: uv run --extra dev pytest

      - name: Build package
        run: uv build

      - name: Check package metadata
        run: uv run --extra dev twine check dist/*

      - name: Smoke test installed wheel
        run: |
          python -m venv /tmp/dreamloop-wheel-smoke
          /tmp/dreamloop-wheel-smoke/bin/pip install dist/*.whl
          /tmp/dreamloop-wheel-smoke/bin/dreamloop --help
          /tmp/dreamloop-wheel-smoke/bin/python - <<'PY'
          from importlib.resources import files
          from dreamloop.web import create_app

          assert (files("dreamloop") / "templates" / "index.html").is_file()
          assert (files("dreamloop") / "templates" / "detail.html").is_file()
          assert (files("dreamloop") / "static" / "style.css").is_file()
          assert create_app().title == "DreamLoop"
          PY
