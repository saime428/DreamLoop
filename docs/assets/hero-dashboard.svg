<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">DreamLoop local-first dashboard</title>
  <desc id="desc">A warm paper and terminal inspired dashboard showing CLI capture, privacy status, heatmap, and recurring symbols.</desc>
