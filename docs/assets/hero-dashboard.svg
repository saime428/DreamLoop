  <text x="800" y="368" fill="#2d332d" font-family="Consolas, monospace" font-size="22">DeepSeek opt-in</text>
  <text x="800" y="406" fill="#2d332d" font-family="Consolas, monospace" font-size="22">Obsidian roadmap</text>
