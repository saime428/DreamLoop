<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">DreamLoop dreamscape dashboard</title>
  <desc id="desc">A dark local-first dream dashboard with a sidebar, dream constellation heatmap, mood spectrum, AI Insight panel, and Dreamscape log.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080713"/>
      <stop offset=".55" stop-color="#120b24"/>
      <stop offset="1" stop-color="#07060c"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#211738"/>
      <stop offset="1" stop-color="#120d22"/>
    </linearGradient>
    <linearGradient id="heat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8e63ff"/>
      <stop offset=".58" stop-color="#c16cff"/>
      <stop offset="1" stop-color="#ff6fa8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <g opacity=".42">
