  <text x="138" y="326" fill="#a7c8b6" font-family="Consolas, monospace" font-size="20">saved locally -> .dreamloop/dreamloop.sqlite3</text>
  <text x="138" y="366" fill="#a7c8b6" font-family="Consolas, monospace" font-size="20">provider -> ollama / qwen3:8b</text>
